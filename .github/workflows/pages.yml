name: Deploy Waldner App to GitHub Pages

# Builds the Vite app (which live-links the vendored @node42/ui-kit under ./ui-kit)
# and publishes app/dist to GitHub Pages. The app uses a relative asset base and a
# HashRouter, so it works from any Pages sub-path without extra config.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # The app compiles the kit's TS source directly, so the kit's dev
      # dependencies (react types, phosphor icons) must be installed too.
      - name: Install UI kit deps
        working-directory: ui-kit
        run: npm ci || npm install

      - name: Install app deps
        working-directory: app
        run: npm ci || npm install

      - name: Build
        working-directory: app
        run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: app/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
